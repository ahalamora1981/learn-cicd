name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        timeout: 60s
        command_timeout: 10m
        script: |
          rm -rf /root/learn-cicd
          cd /root
          wget -q https://github.com/${{ github.repository }}/archive/refs/heads/main.zip -O main.zip
          unzip -q main.zip
          mv learn-cicd-main learn-cicd
          rm main.zip
          cd /root/learn-cicd
          export UV_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
          /root/.local/bin/uv sync --quiet
          pkill -f "uvicorn main:app" || true
          nohup /root/.local/bin/uv run uvicorn main:app --host 0.0.0.0 --port 80 > /dev/null 2>&1 &
          echo "Deploy done"
