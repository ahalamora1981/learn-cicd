name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DEPLOY_KEY }}

    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p 22 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy to server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
        set -e
        cd /root
        rm -rf learn-cicd
        wget -q https://github.com/${{ github.repository }}/archive/refs/heads/main.zip -O main.zip
        unzip -q main.zip
        mv learn-cicd-main learn-cicd
        rm main.zip
        cd learn-cicd
        export UV_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
        /root/.local/bin/uv sync
        pkill -f "uvicorn main:app" || true
        sleep 1
        nohup /root/.local/bin/uv run uvicorn main:app --host 0.0.0.0 --port 80 > /root/uvicorn.log 2>&1 &
        echo "Deploy done at $(date)"
        EOF
